<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Regexutor — Pi Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #2a2a2a 50%, #f6f6f6 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 24px; }
        #status {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(255,255,255,0.05);
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #status.ok   { border: 1px solid #4caf50; color: #81c784; }
        #status.err  { border: 1px solid #f44336; color: #e57373; }
        #status.wait { border: 1px solid #ff9800; color: #ffb74d; }
        button {
            background: #7c4dff;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #651fff; }
        button:disabled { background: #555; cursor: default; }
    </style>
</head>
<body>
<div class="card">
    <h1>Regexutor &copy;</h1>
    <p class="subtitle">Herramienta educativa de expresiones regulares</p>
    <div id="status" class="wait">Cargando&hellip;</div>
    <button id="btn" onclick="doAuth()">Iniciar sesi&oacute;n con Pi</button>
</div>

<script>
    var log = [];
    function setStatus(text, cls) {
        document.getElementById('status').textContent = text;
        document.getElementById('status').className = cls;
    }
    function dbg(msg) { log.push(msg); setStatus(log.join('\n'), 'wait'); }
    dbg('Step 1: page loaded, Pi type=' + typeof Pi);
</script>
<script>
    dbg('Step 2: Pi type after inline script=' + typeof Pi);
    window.addEventListener('load', function() {
        dbg('Step 3: window.load fired, Pi type=' + typeof Pi);
        setTimeout(function() {
            dbg('Step 4: after 2s delay, Pi type=' + typeof Pi +
                ', hasInit=' + (typeof Pi !== 'undefined' ? typeof Pi.init : 'N/A') +
                ', hasAuth=' + (typeof Pi !== 'undefined' ? typeof Pi.authenticate : 'N/A'));
        }, 2000);
    });
</script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
    dbg('Step 5: after SDK script tag, Pi type=' + typeof Pi);
</script>
<script>
    async function doAuth() {
        document.getElementById('btn').disabled = true;
        dbg('Step 6: doAuth called, Pi type=' + typeof Pi);

        if (typeof Pi === 'undefined') {
            dbg('ERROR: Pi is undefined. The SDK from sdk.minepi.com did not load.');
            return;
        }

        try {
            dbg('Step 7: calling Pi.init()...');
            try { await Pi.init(); } catch(e) { dbg('Step 7a: init error (ignored): ' + e.message); }
            dbg('Step 8: calling Pi.authenticate()...');
            var auth = await Pi.authenticate({ scopes: ['username'] });
            setStatus('\u2705 Autenticado: ' + auth.user.username, 'ok');
        } catch (e) {
            dbg('ERROR: ' + (e.message || e));
            document.getElementById('btn').disabled = false;
        }
    }
</script>
</body>
</html>
