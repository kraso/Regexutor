<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Regexutor — Pi Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #2a2a2a 50%, #f6f6f6 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 24px; }
        #status {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.8;
            background: rgba(255,255,255,0.05);
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        #status.ok   { border: 1px solid #4caf50; color: #81c784; }
        #status.err  { border: 1px solid #f44336; color: #e57373; }
        #status.wait { border: 1px solid #ff9800; color: #ffb74d; }
        button {
            background: #7c4dff;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #651fff; }
        button:disabled { background: #555; cursor: default; }
    </style>
</head>
<body>
<div class="card">
    <h1>Regexutor &copy;</h1>
    <p class="subtitle">Herramienta educativa de expresiones regulares</p>
    <div id="status" class="wait">Cargando&hellip;</div>
    <button id="btn" onclick="doAuth()">Iniciar sesi&oacute;n con Pi</button>
</div>

<script>
    var _lines = [];
    function dbg(msg) {
        _lines.push(msg);
        document.getElementById('status').textContent = _lines.join('\n');
        document.getElementById('status').scrollTop = 9999;
    }

    dbg('1. Page loaded. typeof Pi = ' + typeof Pi);
    dbg('2. window.chrome exists = ' + (!!window.chrome));
    dbg('3. window.chrome.webview exists = ' + (!!(window.chrome && window.chrome.webview)));
</script>
<script src="https://sdk.minepi.com/pi-sdk.js?v=dbg1"></script>
<script>
    dbg('4. After SDK script. typeof Pi = ' + typeof Pi);
    if (typeof Pi !== 'undefined') {
        dbg('   Pi.init = ' + typeof Pi.init);
        dbg('   Pi.authenticate = ' + typeof Pi.authenticate);
        dbg('   Pi keys = ' + Object.keys(Pi).join(', '));
    }
</script>
<script>
    async function doAuth() {
        document.getElementById('btn').disabled = true;

        dbg('\n--- doAuth start ---');
        dbg('typeof Pi = ' + typeof Pi);

        if (typeof Pi === 'undefined') {
            dbg('FATAL: Pi not defined');
            document.getElementById('btn').disabled = false;
            return;
        }

        // Capture Pi state BEFORE init
        var initStr = Pi.init.toString().substring(0, 200);
        dbg('Pi.init source: ' + initStr);

        // Try each init signature and collect results
        var tries = [
            ['Pi.init()',                          function(){ return Pi.init(); }],
            ['Pi.init("2.0")',                     function(){ return Pi.init("2.0"); }],
            ['Pi.init({version:"2.0"})',           function(){ return Pi.init({version:"2.0"}); }],
            ['Pi.init({version:"3.0"})',           function(){ return Pi.init({version:"3.0"}); }],
            ['Pi.init({})',                        function(){ return Pi.init({}); }],
            ['Pi.init(null)',                      function(){ return Pi.init(null); }],
        ];

        for (var i = 0; i < tries.length; i++) {
            try {
                await tries[i][1]();
                dbg(tries[i][0] + ' => OK!');
            } catch(e) {
                dbg(tries[i][0] + ' => FAIL: ' + e.message);
            }
        }

        // Now try authenticate
        dbg('\n--- authenticate ---');
        try {
            var auth = await Pi.authenticate({ scopes: ['username'] });
            document.getElementById('status').className = 'ok';
            dbg('SUCCESS: ' + auth.user.username);
        } catch(e) {
            dbg('authenticate FAIL: ' + e.message);
        }

        document.getElementById('btn').disabled = false;
    }
</script>
</body>
</html>
