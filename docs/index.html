<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Regexutor — Pi Network</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #2a2a2a 50%, #f6f6f6 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 24px; }
        #log {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 11px;
            line-height: 1.6;
            background: rgba(255,255,255,0.05);
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        #log.ok   { border: 1px solid #4caf50; color: #81c784; }
        #log.err  { border: 1px solid #f44336; color: #e57373; }
        #log.wait { border: 1px solid #ff9800; color: #ffb74d; }
        button {
            background: #7c4dff;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #651fff; }
        button:disabled { background: #555; cursor: default; }
    </style>
</head>
<body>
<div class="card">
    <h1>Regexutor &copy;</h1>
    <p class="subtitle">Herramienta educativa de expresiones regulares</p>
    <div id="log" class="wait">Cargando&hellip;</div>
    <button id="btn" onclick="doAuth()">Iniciar sesi&oacute;n con Pi</button>
</div>

<script>
var _L = [];
function dbg(m) { _L.push(m); var el = document.getElementById('log'); if(el) el.textContent = _L.join('\n'); }
dbg('T=' + Date.now());
dbg('Pi before任何script = ' + typeof window.Pi);
dbg('chrome.webview = ' + !!(window.chrome && window.chrome.webview));
</script>
<!-- NO CARGAMOS EL SDK — probamos si Pi Desktop inyecta su propio bridge -->
<script>
dbg('After no-SDK. typeof Pi = ' + typeof window.Pi);
if (typeof Pi !== 'undefined') {
    dbg('Pi keys = ' + Object.keys(Pi).join(', '));
    dbg('Pi.init = ' + typeof Pi.init);
    dbg('Pi.authenticate = ' + typeof Pi.authenticate);
}
</script>
<script>
async function doAuth() {
    document.getElementById('btn').disabled = true;
    dbg('\n=== doAuth ===');
    dbg('typeof Pi = ' + typeof window.Pi);

    if (typeof Pi === 'undefined') {
        dbg('Pi not defined. Trying to wait 2s...');
        await new Promise(r => setTimeout(r, 2000));
        dbg('After wait, typeof Pi = ' + typeof window.Pi);
        if (typeof Pi === 'undefined') {
            dbg('STILL no Pi. Loading SDK now...');
            await loadSdk();
        }
    }

    if (typeof Pi === 'undefined') {
        dbg('FATAL: No Pi available');
        document.getElementById('btn').disabled = false;
        return;
    }

    dbg('Pi.init type = ' + typeof Pi.init);
    dbg('Pi.init src = ' + Pi.init.toString().substring(0, 300));

    // Try init variants
    var tries = [
        ['Pi.init()',                     function(){ return Pi.init(); }],
        ['Pi.init("2.0")',               function(){ return Pi.init("2.0"); }],
        ['Pi.init("3.0")',               function(){ return Pi.init("3.0"); }],
        ['Pi.init({version:"2.0"})',     function(){ return Pi.init({version:"2.0"}); }],
        ['Pi.init({version:"3.0"})',     function(){ return Pi.init({version:"3.0"}); }],
        ['Pi.init({})',                   function(){ return Pi.init({}); }],
        ['Pi.init(null)',                 function(){ return Pi.init(null); }],
    ];

    var initOk = false;
    for (var i = 0; i < tries.length; i++) {
        try {
            await tries[i][1]();
            dbg(tries[i][0] + ' => OK!');
            initOk = true;
            break;
        } catch(e) {
            dbg(tries[i][0] + ' => ' + e.message);
        }
    }

    if (!initOk) {
        dbg('\nAll init failed. Trying authenticate anyway...');
    }

    try {
        var auth = await Pi.authenticate({ scopes: ['username'] });
        document.getElementById('log').className = 'ok';
        dbg('AUTH OK: ' + auth.user.username);
    } catch(e) {
        dbg('authenticate => ' + e.message);
    }

    document.getElementById('btn').disabled = false;
}

function loadSdk() {
    return new Promise(function(resolve) {
        var s = document.createElement('script');
        s.src = 'https://sdk.minepi.com/pi-sdk.js?t=' + Date.now();
        s.onload = function() {
            dbg('SDK loaded. Pi = ' + typeof window.Pi);
            resolve();
        };
        s.onerror = function() {
            dbg('SDK load FAILED');
            resolve();
        };
        document.head.appendChild(s);
    });
}
</script>
</body>
</html>
