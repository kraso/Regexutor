<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Regexutor — Pi Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #2a2a2a 50%, #f6f6f6 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 24px; }
        #status {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.6;
            background: rgba(255,255,255,0.05);
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #status.ok   { border: 1px solid #4caf50; color: #81c784; }
        #status.err  { border: 1px solid #f44336; color: #e57373; }
        #status.wait { border: 1px solid #ff9800; color: #ffb74d; }
        button {
            background: #7c4dff;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #651fff; }
        button:disabled { background: #555; cursor: default; }
    </style>
</head>
<body>
<div class="card">
    <h1>Regexutor &copy;</h1>
    <p class="subtitle">Herramienta educativa de expresiones regulares</p>
    <div id="status" class="wait">Cargando&hellip;</div>
    <button id="btn" onclick="doAuth()">Iniciar sesi&oacute;n con Pi</button>
</div>

<script>
    var log = [];
    function dbg(msg) { log.push(msg); document.getElementById('status').textContent = log.join('\n'); }
    dbg('Pre-Pi: typeof=' + typeof Pi);
</script>
<script>window._prePi = typeof Pi;</script>
<script src="https://sdk.minepi.com/pi-sdk.js?v=3"></script>
<script>
    dbg('Post-SDK: typeof=' + typeof Pi + ' (was ' + window._prePi + ')');
    if (typeof Pi !== 'undefined') {
        dbg('Pi.init type=' + typeof Pi.init);
        dbg('Pi.authenticate type=' + typeof Pi.authenticate);
    }
</script>
<script>
    async function doAuth() {
        document.getElementById('btn').disabled = true;
        dbg('\n--- doAuth ---');
        dbg('Pi type=' + typeof Pi);

        if (typeof Pi === 'undefined') {
            dbg('FATAL: Pi is undefined');
            document.getElementById('btn').disabled = false;
            return;
        }

        // Try init with version "2.0"
        try {
            dbg('Calling Pi.init({version:"2.0"})...');
            await Pi.init({ version: "2.0" });
            dbg('Pi.init OK!');
        } catch(e) {
            dbg('Pi.init error: ' + e.message);
        }

        // Try authenticate
        try {
            dbg('Calling Pi.authenticate()...');
            var auth = await Pi.authenticate({ scopes: ['username'] });
            setStatus('\u2705 OK: ' + auth.user.username, 'ok');
        } catch(e) {
            dbg('Pi.authenticate error: ' + e.message);
            document.getElementById('btn').disabled = false;
        }
    }
    window.addEventListener('load', function() { doAuth(); });
</script>
</body>
</html>
