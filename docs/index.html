<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Regexutor — Pi Network</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #2a2a2a 50%, #f6f6f6 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 24px; }
        #log {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.8;
            background: rgba(255,255,255,0.05);
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        #log.ok   { border: 1px solid #4caf50; color: #81c784; }
        #log.err  { border: 1px solid #f44336; color: #e57373; }
        #log.wait { border: 1px solid #ff9800; color: #ffb74d; }
        button {
            background: #7c4dff;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #651fff; }
        button:disabled { background: #555; cursor: default; }
    </style>
</head>
<body>
<div class="card">
    <h1>Regexutor &copy;</h1>
    <p class="subtitle">Herramienta educativa de expresiones regulares</p>
    <div id="log" class="wait">Cargando&hellip;</div>
    <button id="btn" onclick="doAuth()">Iniciar sesi&oacute;n con Pi</button>
</div>

<script>
var _L = [];
function dbg(m) { _L.push(m); var el = document.getElementById('log'); if(el) el.textContent = _L.join('\n'); }
dbg('Page loaded. Loading Pi SDK...');
</script>
<script src="https://sdk.minepi.com/pi-sdk.js?v=v3"></script>
<script>
dbg('SDK loaded. typeof Pi = ' + typeof Pi);
</script>
<script>
async function doAuth() {
    document.getElementById('btn').disabled = true;
    var log = document.getElementById('log');

    dbg('\n--- Pi.init({version:"2.0"}) ---');
    try {
        await Pi.init({version: '2.0'});
        dbg('init OK!');
    } catch(e) {
        dbg('init FAIL: ' + e.message);
        document.getElementById('btn').disabled = false;
        return;
    }

    dbg('\n--- Pi.authenticate(["username"]) ---');
    try {
        var auth = await Pi.authenticate(['username']);
        log.className = 'ok';
        dbg('AUTH OK!');
        dbg('Username: ' + auth.user.username);
        dbg('AccessToken: ' + auth.accessToken);
    } catch(e) {
        log.className = 'err';
        dbg('authenticate FAIL: ' + e.message);
    }

    document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
